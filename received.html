<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Received — The Sage and the Staff</title>
  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/JetBrainsMono-Regular.woff2') format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #030712;
      color: #c8d0dc;
      font-family: "Georgia", "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(6, 182, 212, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      pointer-events: none;
    }
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, #030712 85%);
      z-index: -1;
      pointer-events: none;
    }
    .message {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #94a3b8;
      letter-spacing: 0.05em;
      line-height: 2.4;
    }
    .back {
      display: inline-block;
      margin-top: 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #06b6d4;
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .back:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="vignette"></div>
  <div>
    <div class="message">Received.<br>The sage will be in touch.</div>
    <a href="/" class="back">&larr; Return to the novel</a>
  </div>
</body>
</html>
